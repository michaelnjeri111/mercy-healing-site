<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>A Light That Never Leaves</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>

  <div id="stars"></div>
  <div id="dove"></div>

  <main class="container">

    <h1>A Light That Never Leaves</h1>

    <p class="tribute-name">In loving memory of Marvin Kizito</p>

    <!-- Mode Toggle -->
    <button class="mode-btn" onclick="toggleMode()">🌙 Toggle Healing Mode</button>

    <!-- Candle -->
    <div class="candle">
      <div class="flame"></div>
      <div class="wick"></div>
      <div class="wax"></div>
    </div>

    <p class="subtitle">
      Love never dies. It only changes form.
    </p>

    <!-- Buttons -->
    <div class="buttons">

      <button onclick="showMessage('strength')">I Need Strength</button>
      <button onclick="showMessage('lonely')">I Feel Lonely</button>
      <button onclick="showMessage('memory')">I Miss Him</button>
      <button onclick="showMessage('hope')">I Need Hope</button>
      <button onclick="showMessage('support')">I’m Here For You</button>

    </div>

    <div class="message-box" id="messageBox">
      Click a button above...
    </div>

    <!-- Memory Section -->
    <section class="memory-section">

      <h2>Memory Wall</h2>

      <input type="file" id="photoInput" accept="image/*">

      <textarea id="memoryText" placeholder="Write your memory here..."></textarea>

      <button onclick="addMemory()">Save Memory</button>

      <div id="memoryGallery"></div>

    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
